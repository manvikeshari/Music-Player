<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aura Music" />
  <meta name="description" content="A beautiful offline-first music player" />
  <title>Aura Music</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SPLASH ── -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-vinyl">
        <div class="splash-vinyl-inner"></div>
      </div>
      <h1>AURA</h1>
      <p>Your music, your world</p>
    </div>
  </div>

  <!-- ── APP SHELL ── -->
  <div id="app" class="hidden">

    <!-- PLAYER VIEW -->
    <section id="view-player" class="view active">
      <div class="player-bg-blur" id="playerBgBlur"></div>

      <!-- top bar -->
      <header class="player-header">
        <button class="icon-btn" id="btnOpenLibrary" aria-label="Open library">
          <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <span class="header-title">NOW PLAYING</span>
        <button class="icon-btn" id="btnImport" aria-label="Import music">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <input type="file" id="fileInput" accept="audio/*" multiple hidden />
      </header>

      <!-- vinyl stage -->
      <div class="vinyl-stage">
        <div class="aurora-ring" id="auroraRing"></div>
        <div class="vinyl-wrap" id="vinylWrap">
          <div class="vinyl" id="vinyl">
            <div class="vinyl-label" id="vinylLabel">
              <div class="vinyl-label-inner">
                <span id="vinylTitle">–</span>
              </div>
            </div>
          </div>
          <div class="needle-arm" id="needleArm">
            <div class="needle-pivot"></div>
            <div class="needle-shaft"></div>
            <div class="needle-head"></div>
          </div>
        </div>
      </div>

      <!-- track info -->
      <div class="track-info">
        <h2 id="trackTitle">No song selected</h2>
        <p id="trackArtist">Import songs to begin</p>
      </div>

      <!-- progress -->
      <div class="progress-area">
        <span id="timeElapsed">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span id="timeDuration">0:00</span>
      </div>

      <!-- controls -->
      <div class="controls">
        <button class="ctrl-btn ctrl-sm" id="btnLoop" aria-label="Loop" title="Loop">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-md" id="btnPrev" aria-label="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-lg" id="btnPlayPause" aria-label="Play">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-md" id="btnNext" aria-label="Next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.14 2.64L8 15.34V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-sm" id="btnShuffle" aria-label="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
      </div>

      <!-- visualizer -->
      <canvas id="visualizer" class="visualizer"></canvas>
    </section>

    <!-- LIBRARY VIEW -->
    <section id="view-library" class="view">
      <header class="lib-header">
        <button class="icon-btn" id="btnCloseLibrary" aria-label="Close library">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span class="header-title">LIBRARY</span>
        <span class="song-count" id="songCount">0 songs</span>
      </header>

      <div class="search-bar">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Search songs…" />
      </div>

      <div class="lib-list" id="libList">
        <div class="empty-state" id="emptyState">
          <div class="empty-vinyl"></div>
          <p>Your library is empty</p>
          <small>Tap <strong>+</strong> on the player to import songs</small>
        </div>
      </div>
    </section>

  </div><!-- /app -->

  <!-- hidden audio element -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <!-- toast -->
  <div id="toast" class="toast"></div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
